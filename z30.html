Obiekt to router <br>
Pola: <br>
aktywny <br>
warstwa <br>
ip <br>
metoda: wyswietl <br>

<script>
    const router = {
        aktywny: 'aktywny',
        warstwa: '3osi',
        ip: 'posiada wlasne ip',
        wyswietl: function (){
            document.write(this.aktywny + ' ' + this.warstwa + ' ' + this.ip);
        }
    }
    router.wyswietl();
</script>
