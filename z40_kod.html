  <body>
	<div style="color:red;font-size:50px;"> 
		<script language="JavaScript"> 
		var x=prompt("podaj argument x=",""); 
        var x_wojciechowski=parseFloat(x);
		document.write("wykonał adam wojciechowski"+"<br>"); 
		document.write("czytany argument x="+x_wojciechowski.toFixed(2)+"<br>")
		function f_woj(x_wojciechowski) 
		{ 
			if(x_wojciechowski>=2) {return 9;} 
			if((x_wojciechowski<0) && (x_wojciechowski>-2)) {return (x_wojciechowski+1)**2;} 
			if(x_wojciechowski>=2) {return x_wojciechowski**3+1;} 
			if(x_wojciechowski<-2) {return 1;} 
        } 

		document.write("f("+x_wojciechowski.toFixed(2)+")="+f_woj(x_wojciechowski).toFixed(2)+"<br>");
		</script>
